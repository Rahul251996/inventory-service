spring.application.name=inventory-service
# ===============================
# SERVER CONFIG
# ===============================
server.port=8082

eureka.client.service-url.defaultZone=http://localhost:8761/eureka


# ===============================
# MYSQL DATABASE CONFIG
# ===============================
spring.datasource.url=jdbc:mysql://inventory-mysql:3306/inventorydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# HIKARI CONNECTION POOL
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# KAFKA CONFIG
# ===============================
#spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.group-id=rahul-test-group-reset


# ===============================
# ACTUATOR / MANAGEMENT
# ===============================
management.endpoints.web.exposure.include=health,info,metrics

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.example.order=DEBUG
logging.level.org.springframework.kafka=DEBUG
logging.level.org.apache.kafka=INFO
logging.level.com.quickshop=DEBUG
logging.file.name=logs/inventory-service.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{X-Correlation-Id}] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{X-Correlation-Id}] %-5level %logger{36} - %msg%n

###################################################
#spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8091/realms/quickshop-realm

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://quickshop-keycloak-1:8080/realms/quickshop-realm
logging.level.org.springframework.security=DEBUG